<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo -->
  <rect width="512" height="512" fill="#f8fafc"/>

  <!-- Ejes sutiles -->
  <line x1="60" y1="420" x2="460" y2="420" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="60" y1="60" x2="60" y2="420" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Gráfica de crecimiento (línea + área) -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Área bajo la curva -->
  <polygon points="80,340 150,260 220,200 290,140 360,90 430,50 430,420 80,420" fill="url(#gradient)"/>

  <!-- Línea de crecimiento -->
  <polyline points="80,340 150,260 220,200 290,140 360,90 430,50" stroke="#2563eb" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Puntos en la línea -->
  <circle cx="80" cy="340" r="8" fill="#2563eb"/>
  <circle cx="150" cy="260" r="8" fill="#2563eb"/>
  <circle cx="220" cy="200" r="8" fill="#2563eb"/>
  <circle cx="290" cy="140" r="8" fill="#2563eb"/>
  <circle cx="360" cy="90" r="8" fill="#2563eb"/>
  <circle cx="430" cy="50" r="8" fill="#2563eb"/>
</svg>